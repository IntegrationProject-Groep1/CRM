name: CI Pipeline

on:
  push:
    branches: [main, develop, prod]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Check syntax
        run: |
          node --check src/sfConnection.js
          node --check src/sender.js
          node --check src/receiver.js
          node --check src/heartbeat.js
          echo "All files syntax OK"

      - name: Run unit tests
        run: npm test

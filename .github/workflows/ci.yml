name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 src/ --max-line-length=120 --extend-ignore=E501 --exclude=__pycache__ --statistics

      - name: Check syntax
        run: |
          python -m py_compile src/sender.py
          python -m py_compile src/receiver_v2.py
          python -m py_compile src/heartbeat_v2.py
          python -m py_compile src/sf_connection.py
          echo "All files compile successfully"

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v

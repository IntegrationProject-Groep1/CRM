services:
  crm-receiver:
    build: .
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      rabbitmq_broker:
        condition: service_healthy
    restart: on-failure

  rabbitmq_broker:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      # The broker is initialized with the same credentials that the receiver
      # uses, so the two containers can authenticate without a separate URL.
      # When the host-side RabbitMQ variables are missing, Compose falls back
      # to guest/guest so local development still starts cleanly.
      RABBITMQ_DEFAULT_USER: ${RABBITMQCRM_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQCRM_PASSRAW:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
